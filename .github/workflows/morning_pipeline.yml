# ═══════════════════════════════════════════════════════════════
#  HYPERION V10 — Pipeline Matin (GitHub Actions)
#  Déclenchement : 09h00 UTC (= 09h00 heure Burkina Faso UTC+0)
#  Runner : ubuntu-latest | Python 3.11
# ═══════════════════════════════════════════════════════════════

name: Hyperion V10 — Pipeline Matin

on:
  schedule:
    # ┌──────── minute (0-59)
    # │  ┌───── heure  (0-23 UTC)
    # │  │  ┌── jour   (* = tous)
    # 0  9  *  *  * → 09h00 UTC chaque jour
    - cron: "0 9 * * *"

  # Déclenchement manuel avec paramètres
  workflow_dispatch:
    inputs:
      target_date:
        description: "Date cible (YYYY-MM-DD, vide = aujourd'hui)"
        required: false
        default: ""
      test_mode:
        description: "Mode test (sans Telegram/Firebase)"
        type: boolean
        required: false
        default: false

env:
  PYTHON_VERSION: "3.11"
  TZ: "UTC"

jobs:
  morning_pipeline:
    name: Pipeline Matin LONAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ───────────────────────────────────
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # ── 3. Installation des dépendances ───────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Vérification des secrets ───────────────────────
      - name: Verify required secrets
        run: |
          echo "🔍 Vérification des secrets..."
          missing=0
          if [ -z "${{ secrets.GEMINI_API_KEY_1 }}" ]; then
            echo "❌ GEMINI_API_KEY_1 manquant"
            missing=1
          fi
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "⚠️  TELEGRAM_BOT_TOKEN manquant (mode console)"
          fi
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "⚠️  TELEGRAM_CHAT_ID manquant (mode console)"
          fi
          if [ "$missing" -eq 1 ]; then
            echo "❌ Secrets obligatoires manquants — arrêt"
            exit 1
          fi
          echo "✅ Secrets vérifiés"

      # ── 5. Création des répertoires ───────────────────────
      - name: Create required directories
        run: |
          mkdir -p data/cache data/backups logs outputs backup/telegram

      # ── 6. Lancement du pipeline ──────────────────────────
      - name: Run morning pipeline
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          # Construire les arguments CLI
          ARGS=""

          # Date cible (workflow_dispatch ou date du jour)
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.target_date }}"
          fi

          # Mode test
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi

          echo "🚀 Lancement : python main.py $ARGS"
          python main.py $ARGS

      # ── 7. Upload artefacts (logs + outputs) ─────────────
      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hyperion-morning-${{ github.run_id }}
          path: |
            outputs/
            logs/
            backup/
          retention-days: 30

      # ── 8. Notification d'échec ───────────────────────────
      - name: Notify failure via Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            DATE=$(date '+%d/%m/%Y %H:%M UTC')
            MESSAGE="❌ <b>HYPERION V10 — ÉCHEC PIPELINE MATIN</b>%0A"
            MESSAGE="${MESSAGE}📅 ${DATE}%0A"
            MESSAGE="${MESSAGE}🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Voir les logs</a>"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "parse_mode=HTML" \
              -d "text=${MESSAGE}" \
              -d "disable_web_page_preview=true" || true
          fi
